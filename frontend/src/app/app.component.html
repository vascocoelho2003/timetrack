@if (auth.isLoggedIn) {
  <header class="app-header">
    <div class="header-left">
      <a routerLink="/reports" class="logo">
        <span style="font-weight: 300;">JC Ribeiro - Task Management</span>
      </a>
    </div>
    <nav
      class="header-nav"
      [class.open]="menuOpen">
      <a
        routerLink="/reports"
        class="nav-link"
        [class.active]="isActive('/reports')"
        (click)="closeMenu()">
        Relatórios
      </a>
      <a
        routerLink="/teams"
        class="nav-link"
        [class.active]="isActive('/teams')"
        (click)="closeMenu()">
        Equipas
      </a>
      <a
        routerLink="/my_projects"
        class="nav-link"
        [class.active]="isActive('/my_projects')"
        (click)="closeMenu()">
        Projetos
      </a>
      <a
        routerLink="/my-tasks"
        class="nav-link"
        [class.active]="isActive('/my-tasks')"
        (click)="closeMenu()">
        Tarefas
      </a>
    </nav>
    @if (timer.activeEntry(); as active) {
      <div class="header-timer">
        <span>
          ⏱ {{ fmt(timer.elapsedSeconds()) }}
        </span>
        <span class="task-title">
          {{ active.task_title }}
        </span>
        <button class="btn btn-sm btn-danger" (click)="timer.stop()">
          Parar
        </button>
      </div>
    }
    <div class="header-user">
      <span style="font-weight: 300;">{{ auth.currentUser()?.username }}</span>
      <button
        class="btn btn-ghost btn-sm"
        (click)="auth.logout()">
        Sair
      </button>
    </div>
  </header>
}

<main [class.with-header]="auth.isLoggedIn">
  <router-outlet/>
</main>
