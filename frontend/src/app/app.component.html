@if (auth.isLoggedIn) {
  <header class="app-header">
    <div class="header-left">
  @if (showBurger) {
    <button
      class="burger-btn"
      (click)="toggleMenu()">
      ☰
    </button>
  }
      <a routerLink="/teams" class="logo">
        JC Ribeiro - Task Management
      </a>
    </div>
    <nav
      class="header-nav"
      [class.open]="menuOpen">
      <a
        routerLink="/reports"
        class="nav-link"
        [class.active]="isActive('/reports')"
        (click)="closeMenu()">
        Dashboard
      </a>
      <a
        routerLink="/teams"
        class="nav-link"
        [class.active]="isActive('/teams')"
        (click)="closeMenu()">
        Teams
      </a>
      <a
        routerLink="/projects"
        class="nav-link"
        [class.active]="isActive('/projects')"
        (click)="closeMenu()">
        Projetos
      </a>
      <a
        routerLink="/my-tasks"
        class="nav-link"
        [class.active]="isActive('/my-tasks')"
        (click)="closeMenu()">
        Tarefas
      </a>
    </nav>
    @if (timer.activeEntry(); as active) {
      <div class="header-timer">
        <span>
          ⏱ {{ fmt(timer.elapsedSeconds()) }}
        </span>
        <span class="task-title">
          {{ active.task_title }}
        </span>
        <button class="btn btn-sm btn-danger" (click)="timer.stop()">
          Parar
        </button>
      </div>
    }
    <div class="header-user">
      <span>{{ auth.currentUser()?.username }}</span>
      <button
        class="btn btn-ghost btn-sm"
        (click)="auth.logout()">
        Sair
      </button>
    </div>
  </header>
}

<main [class.with-header]="auth.isLoggedIn">
  <router-outlet />
</main>
