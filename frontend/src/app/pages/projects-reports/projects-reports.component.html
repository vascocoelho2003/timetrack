<div class="page">
  <a routerLink="/reports" class="back">← Dashboard</a>
  <h1>Relatórios de Projeto</h1>

  <div class="toolbar">
    <div class="search">
      <input type="text" placeholder="Pesquisar Projeto">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <div class="filter">Filtrar p/ Equipa <span>▾</span></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Projeto</th>
          <th>Equipa</th>
          <th>Tarefas Abertas</th>
          <th>Tarefas Fechadas</th>
        </tr>
      </thead>
      <tbody>
        @for( proj of projects; track proj.id){
        <tr>
          <td>{{proj.name}}</td>
          <td>
            <a [routerLink]="['/teams', proj.team_id]" class="team-name">
              {{ proj.team_name }}
            </a>
            @for (m of proj.members; track m.id) {
              <div class="team-members">
                <span>{{ m.username }}</span>
              </div>
            }
          </td>
          <td>{{proj.todo_tasks}}</td>
          <td>{{proj.done_tasks}}</td>
        </tr>
      }
      </tbody>
    </table>
  </div>
</div>
